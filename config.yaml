server:
  host: "127.0.0.1"
  port: 8000
transcription:
  cache_dir: ".cache/models"
  max_upload_size_mb: 100
  upload_chunk_size_mb: 1
  default_upload_filename: "recording.webm"
  supported_languages:
    - code: "de"
      label: "German"
    - code: "en"
      label: "English"
  supported_model_sizes:
    - id: "tiny"
      label: "Tiny"
      model_name: "mlx-community/whisper-tiny-mlx"
    - id: "base"
      label: "Base"
      model_name: "mlx-community/whisper-base-mlx"
    - id: "small"
      label: "Small"
      model_name: "mlx-community/whisper-small-mlx"
    - id: "medium"
      label: "Medium"
      model_name: "mlx-community/whisper-medium-mlx"
    - id: "large"
      label: "Large"
      model_name: "mlx-community/whisper-large-v3-turbo"
    - id: "vibevoice-7b"
      label: "VibeVoice ASR 7B"
      model_name: "microsoft/VibeVoice-ASR"
      backend: "vibevoice_asr"
  vibevoice_repo_path: "../../_ GitHub generell/VibeVoice"
  vibevoice_device: "auto"
  vibevoice_dtype: "auto"
  vibevoice_attention: "auto"
  vibevoice_max_new_tokens: 4096
  vibevoice_temperature: 0.0
  vibevoice_top_p: 1.0
  vibevoice_do_sample: false
  vibevoice_num_beams: 1
  vibevoice_repetition_penalty: 1.0
logging:
  level: "INFO"
ui:
  copy_feedback_ms: 1400
  progress_model_factors:
    tiny: 0.35
    base: 0.5
    small: 0.75
    medium: 1.1
    large: 1.6
    vibevoice-7b: 2.6
  progress_default_model_factor: 1.0
  progress_default_audio_seconds: 30.0
  progress_min_processing_seconds: 8.0
  progress_metadata_timeout_ms: 1500
  progress_update_interval_ms: 1000
  progress_upload_fraction: 0.2
  progress_transcription_fraction: 0.75
  progress_max_transcription_fraction: 0.95
  progress_min_visible_percent: 4
  processing_status_message: "Transcribing audio locally..."
  upload_status_message: "Processing audio file locally..."
  upload_ready_status_message: "Ready to process {filename}."
  empty_recording_message: "Record a little audio before stopping."
  missing_upload_message: "Choose an audio file before processing."
  ready_status_message: "Ready to record or process audio."
  recording_status_message: "Recording..."
  completion_status_message: "Transcription complete."
  processing_network_error_message: "Processing failed before the server returned a response."
  microphone_blocked_message: "Microphone access is blocked. Allow access in your browser settings and try again."
  recording_start_error_message: "Recording could not start. Check your microphone and try again."
  clipboard_unavailable_message: "Clipboard access is unavailable in this browser."
  save_success_message: "Saved transcript as {filename}."
  save_unavailable_message: "Transcript download is unavailable in this browser."
  audio_file_button_label: "Choose Audio File"
  audio_file_empty_label: "No file selected"
  copy_button_label: "Copy"
  copy_success_label: "Copied"
  record_button_label: "Record"
  stop_button_label: "Stop"
  timer_idle_label: "Idle"
  timer_ready_label: "Ready"
  timer_recording_label: "Recording"
  timer_processing_label: "Processing"
  progress_waiting_message: "Waiting for audio."
  progress_preparing_message: "Preparing audio..."
  progress_complete_message: "Complete"
  progress_transcribing_message: "Transcribing audio locally, about {remaining} time left"
  progress_uploading_message: "Uploading audio, {percent} complete"
